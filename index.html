<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindustry TTK TvU</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121214; color: #e1e1e6; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #f39c12; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #29292e; padding-bottom: 10px; }
        .tab-btn { background: #202024; border: 1px solid #29292e; color: #a8a8b3; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .tab-btn.active { background: #f39c12; color: #121214; border-color: #f39c12; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* About Sheet Styling */
        .rules-card { background: #202024; border: 1px solid #29292e; padding: 25px; border-radius: 6px; line-height: 1.7; }
        .about-row { margin-bottom: 10px; font-size: 1.05em; }
        .about-header-text { color: #f39c12; font-weight: bold; font-size: 1.2em; margin-bottom: 15px; border-bottom: 1px solid #3e3e42; padding-bottom: 5px; }
        
        .loading { color: #f39c12; font-weight: bold; font-size: 1.2em; margin-bottom: 20px; }
        
        /* Dark Mode Styling for DataTables */
        .dataTables_wrapper { background: #202024; padding: 15px; border-radius: 6px; border: 1px solid #29292e; color: #e1e1e6; margin-top: 15px; }
        table.dataTable { background-color: #1a1a1e !important; color: #e1e1e6 !important; border-collapse: collapse !important; }
        table.dataTable thead th { background-color: #29292e !important; color: #f39c12 !important; border-bottom: 1px solid #3e3e42 !important; padding: 10px !important; }
        table.dataTable tbody tr { background-color: #1a1a1e !important; }
        table.dataTable tbody tr:hover { background-color: #29292e !important; }
        table.dataTable td { border-bottom: 1px solid #29292e !important; padding: 8px !important; text-align: center; font-weight: 500; }
        
        /* Prevent text columns from centering */
        table.dataTable td:nth-child(1), table.dataTable td:nth-child(2), table.dataTable td:nth-child(3) { text-align: left; }

        .dataTables_wrapper .dataTables_filter input, .dataTables_wrapper .dataTables_length select { background: #121214; border: 1px solid #3e3e42; color: #e1e1e6; padding: 5px; border-radius: 4px; }
        .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_paginate .paginate_button { color: #e1e1e6 !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mindustry TTK</h1>

    <div id="loadingMessage" class="loading">Reading Excel Workbook (.xlsx)... Please wait...</div>

    <div class="tabs" style="display:none;" id="navigationTabs">
        <button class="tab-btn active" onclick="switchTab('about')">About & Methodology</button>
        <button class="tab-btn" onclick="switchTab('erekir')">Erekir Data</button>
        <button class="tab-btn" onclick="switchTab('serpulo')">Serpulo Data</button>
        <button class="tab-btn" onclick="switchTab('sortammo')">Sort Ammo</button>
    </div>

    <div id="about" class="tab-content active">
        <div class="rules-card" id="aboutContent"></div>
    </div>

    <div id="erekir" class="tab-content">
        <table id="erekirTable" class="display" style="width:100%"></table>
    </div>

    <div id="serpulo" class="tab-content">
        <table id="serpuloTable" class="display" style="width:100%"></table>
    </div>

    <div id="sortammo" class="tab-content">
        <table id="sortammoTable" class="display" style="width:100%"></table>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Creates interactive table and applies custom colors dynamically per cell
    function createDataTable(jsonData, tableId) {
        if (!jsonData || jsonData.length === 0) return;

        let columns = Object.keys(jsonData[0]).map(key => ({
            title: key,
            data: key,
            defaultContent: "-"
        }));

        $(`#${tableId}`).DataTable({
            data: jsonData,
            columns: columns,
            pageLength: 25,
            scrollX: true,
            responsive: true,
            // Custom row building callback to style the matching cells
            createdRow: function(row, data, dataIndex) {
                $('td', row).each(function() {
                    var cellText = $(this).text().trim();
                    if (!cellText || cellText === "-") return;

                    // Rule 1: N is gray
                    if (cellText === 'N') {
                        $(this).css({ 'background-color': 'rgba(90, 90, 95, 0.45)', 'color': '#a8a8b3' });
                        return;
                    }
                    // Rule 2: Contains T (T, ≈T) is dark red
                    if (cellText.includes('T')) {
                        $(this).css({ 'background-color': 'rgba(110, 15, 15, 0.6)', 'color': '#ffcccc' });
                        return;
                    }
                    // Rule 3: Contains ≈ is red
                    if (cellText.includes('≈')) {
                        $(this).css({ 'background-color': 'rgba(190, 30, 30, 0.45)', 'color': '#ffcccc' });
                        return;
                    }

                    // Clean the text to parse numbers out of strings
                    var cleanText = cellText.replace(/[^\d.]/g, ''); 
                    var val = parseFloat(cleanText);

                    // Skip names/non-numeric columns (like turret or ammo names)
                    if (isNaN(val)) return;

                    // Rule 4: Scaled Colors (Using soft alpha opacity for dark-mode readability)
                    var r, g, b;
                    if (val <= 1) {
                        // Under 1s is Green
                        r = 46; g = 204; b = 113;
                    } else if (val <= 10) {
                        // Blend between Green (1s) and Yellow (10s)
                        var p = (val - 1) / 9;
                        r = Math.round(46 + p * (241 - 46));
                        g = Math.round(204 + p * (196 - 204));
                        b = Math.round(113 + p * (15 - 113));
                    } else if (val <= 120) {
                        // Blend between Yellow (10s) and Red (120s)
                        var p = (val - 10) / 110;
                        r = Math.round(241 + p * (231 - 241));
                        g = Math.round(196 + p * (76 - 196));
                        b = Math.round(15 + p * (60 - 15));
                    } else {
                        // Over 120s is Solid Red
                        r = 231; g = 76; b = 60;
                    }

                    $(this).css('background-color', `rgba(${r}, ${g}, ${b}, 0.3)`);
                });
            }
        });
    }

    // Dynamic processing for the layout documentation
    function renderAboutTab(sheet) {
        const rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        const container = document.getElementById('aboutContent');
        
        rawRows.forEach((row) => {
            if (!row || row.length === 0 || row[0] === undefined) return;
            const textContent = row[0].toString().trim();
            if (textContent === "") return;

            const div = document.createElement('div');
            if (textContent.toLowerCase().includes('reminder:') || textContent.toLowerCase().includes('hello!')) {
                div.className = 'about-header-text';
                div.innerText = textContent;
            } else {
                div.className = 'about-row';
                div.innerText = textContent;
            }
            container.appendChild(div);
        });
    }

    $(document).ready(function() {
        const excelFileName = 'TTK mindustry TvU 157.4.xlsx'; 

        fetch(excelFileName)
            .then(res => {
                if (!res.ok) throw new Error("Excel asset not found.");
                return res.arrayBuffer();
            })
            .then(ab => {
                const workbook = XLSX.read(new Uint8Array(ab), { type: 'array' });
                
                const aboutSheet = workbook.Sheets['about'] || workbook.Sheets[workbook.SheetNames[3]];
                const erekirData = XLSX.utils.sheet_to_json(workbook.Sheets['erekir raw'] || workbook.Sheets[workbook.SheetNames[2]]);
                const serpuloData = XLSX.utils.sheet_to_json(workbook.Sheets['serpulo raw'] || workbook.Sheets[workbook.SheetNames[1]]);
                const sortAmmoData = XLSX.utils.sheet_to_json(workbook.Sheets['Sort Ammo'] || workbook.Sheets[workbook.SheetNames[0]]);

                renderAboutTab(aboutSheet);
                createDataTable(erekirData, 'erekirTable');
                createDataTable(serpuloData, 'serpuloTable');
                createDataTable(sortAmmoData, 'sortammoTable');

                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('navigationTabs').style.display = 'flex';
            })
            .catch(err => {
                document.getElementById('loadingMessage').innerText = "Failed to load '" + excelFileName + "'. Verify the file name matches your repository structure.";
                console.error(err);
            });
    });
</script>
</body>
</html>
